# Workflow for building and deploying a Next.js site to GitHub Pages
# For customer support and information (separate from Expo mobile app)
name: Deploy KYZO Support Site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - "fashion-app/**"
      - ".github/workflows/nextjs-gh-pages.yml"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fashion-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./fashion-app/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ./fashion-app/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('./fashion-app/package-lock.json') }}-${{ hashFiles('./fashion-app/**/*.js', './fashion-app/**/*.jsx', './fashion-app/**/*.ts', './fashion-app/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('./fashion-app/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://harqer.github.io/kyzo
          NEXT_PUBLIC_API_URL: https://api.kyzo.com

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./fashion-app/dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
